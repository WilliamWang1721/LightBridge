<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>提供商 PROVIDER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page: #ffffff;
      --bg-surface: #fafafa;
      --bg-card: #ffffff;
      --border: #e8e8e8;
      --text-main: #0d0d0d;
      --text-secondary: #7a7a7a;
      --text-muted: #b0b0b0;
      --red-primary: #e42313;
      --success: #22c55e;
      --font-display: "Space Grotesk", "Noto Sans SC", sans-serif;
      --font-body: "Inter", "Noto Sans SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg-page);
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.45;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
    }

    .shell {
      display: flex;
      min-height: 100vh;
      background: var(--bg-page);
    }

    /* Sidebar (kept consistent with existing) */
    .sidebar {
      width: 240px;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 32px;
      border-right: 1px solid var(--border);
      background: var(--bg-page);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-bottom: 48px;
      font-family: var(--font-display);
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      background: var(--red-primary);
      display: inline-block;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-item {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      font-size: 14px;
      color: var(--text-secondary);
      transition: color 0.2s ease;
      font-family: var(--font-display);
      font-weight: 400;
    }

    .menu-item:hover {
      color: var(--text-main);
    }

    .menu-item.is-active {
      color: var(--text-main);
      font-weight: 500;
    }

    .menu-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--bg-page);
      flex-shrink: 0;
    }

    .menu-item.is-active .menu-dot {
      background: var(--red-primary);
    }

    .sidebar-bottom {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-chip {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--text-main);
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-display);
      border: 0;
    }

    .sidebar-user {
      font-size: 13px;
      color: var(--text-main);
      font-weight: 500;
      font-family: var(--font-display);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Content */
    .content {
      flex: 1;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      gap: 48px;
      background: var(--bg-page);
      min-width: 0;
    }

    .top-area {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      width: 100%;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .page-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -1px;
      line-height: 1.08;
      color: var(--text-main);
    }

    .page-subtitle {
      margin: 0;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .header-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--bg-page);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-main);
      padding: 10px;
    }

    .icon-btn:active {
      transform: translateY(1px);
    }

    .add-btn {
      height: 36px;
      width: 96px;
      padding: 10px 20px;
      border: 0;
      background: var(--text-main);
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
    }

    .add-btn .icon {
      stroke: #ffffff;
    }

    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
      min-height: 0;
    }

    .list-panel {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .table-row {
      width: 100%;
      border: 1px solid var(--border);
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .table-row.header {
      height: 42px;
      background: var(--bg-surface);
    }

    .table-row.data {
      height: 68px;
      background: var(--bg-page);
    }

    .cell {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .th {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .account {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-main);
    }

    .cell-stack {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: center;
      justify-content: center;
    }

    .stack-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }

    .stack-subtitle {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      width: 100%;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      display: inline-block;
      background: currentColor;
    }

    .status.ok {
      color: var(--success);
    }

    .status.bad {
      color: var(--red-primary);
    }

    .usage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
    }

    .usage-pct {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      width: 100%;
      text-align: center;
    }

    .usage-bar {
      width: 116px;
      height: 8px;
      background: #f2f2f2;
    }

    .usage-fill {
      height: 100%;
      width: var(--w, 0px);
      background: var(--c, var(--success));
    }

    .more {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      width: 14px;
      text-align: center;
    }

    .bottom-pagination {
      width: 100%;
      height: 56px;
      padding: 0 0 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .pager {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .page {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--bg-page);
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
      user-select: none;
    }

    .page.active {
      background: var(--text-main);
      border-color: var(--text-main);
      color: #ffffff;
      font-weight: 500;
    }

    .scroll-btn {
      width: 112px;
      height: 36px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: var(--bg-page);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      color: var(--text-main);
      flex-shrink: 0;
    }

    .scroll-btn span {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* Dialog */
    dialog {
      width: min(760px, calc(100vw - 32px));
      border: 1px solid var(--border);
      padding: 18px 18px 16px;
      background: var(--bg-page);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.35);
    }

    .dialog-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 8px;
    }

    .dialog-field--full {
      grid-column: 1 / -1;
    }

    .dialog-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dialog-label {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .dialog-input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      color: var(--text-main);
      outline: none;
    }

    .dialog-input:focus {
      border-color: #d0d0d0;
    }

    .dialog-textarea {
      resize: vertical;
      min-height: 140px;
      line-height: 1.5;
    }

    .dialog-check {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-main);
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .dialog-btn {
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--border);
      background: var(--bg-page);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .dialog-btn.primary {
      background: var(--text-main);
      border-color: var(--text-main);
      color: #ffffff;
    }

    @media (max-width: 860px) {
      .dialog-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      .shell {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-width: 0;
        border-right: 0;
        border-bottom: 1px solid var(--border);
        padding: 20px 18px;
        gap: 18px;
      }

      .brand {
        margin-bottom: 12px;
      }

      .menu {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 12px 16px;
      }

      .sidebar-bottom {
        justify-content: flex-end;
      }

      .content {
        padding: 20px 18px 24px;
        gap: 24px;
      }

      .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .page-title {
        font-size: 34px;
      }

      .header-actions {
        width: 100%;
        justify-content: flex-start;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar" aria-label="Sidebar">
      <div class="sidebar-top">
        <a class="brand" href="/admin/dashboard">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>LightBridge</span>
        </a>
        <nav class="menu" aria-label="主导航">
          <a class="menu-item" href="/admin/dashboard"><span class="menu-dot" aria-hidden="true"></span>概览 Overview</a>
          <a class="menu-item is-active" href="/admin/providers"><span class="menu-dot" aria-hidden="true"></span>提供商 Provider</a>
          <a class="menu-item" href="/admin/models"><span class="menu-dot" aria-hidden="true"></span>凭证 Voucher</a>
          <a class="menu-item" href="/admin/docs"><span class="menu-dot" aria-hidden="true"></span>配置 Configuration</a>
          <a class="menu-item" href="/admin/marketplace"><span class="menu-dot" aria-hidden="true"></span>模块 Plugin</a>
          <a class="menu-item" href="/admin/logs"><span class="menu-dot" aria-hidden="true"></span>设置 Settings</a>
        </nav>
      </div>
      <div class="sidebar-bottom">
        <span class="admin-chip">A</span>
        <span class="sidebar-user">{{.Username}}</span>
      </div>
    </aside>

    <main class="content">
      <section class="top-area" aria-label="页面标题">
        <header class="page-header">
          <div class="header-left">
            <h1 class="page-title">提供商 PROVIDER</h1>
            <p class="page-subtitle">管理 OAuth 与凭证文件，并维护 Provider 列表</p>
          </div>
          <div class="header-actions" aria-label="操作">
            <button class="icon-btn" type="button" aria-label="视图">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
            </button>
            <button class="icon-btn" type="button" aria-label="多选">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <polyline points="7 12 10 15 16 9"></polyline>
                <polyline points="7 6 10 9 16 3"></polyline>
                <polyline points="7 18 10 21 16 15"></polyline>
              </svg>
            </button>
            <button class="icon-btn" type="button" aria-label="筛选">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <polygon points="22 3 2 3 10 12 10 19 14 21 14 12 22 3"></polygon>
              </svg>
            </button>
            <button class="add-btn" type="button" id="add-provider-btn" aria-label="添加">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <line x1="12" x2="12" y1="5" y2="19"></line>
                <line x1="5" x2="19" y1="12" y2="12"></line>
              </svg>
              <span>添加</span>
            </button>
          </div>
        </header>
      </section>

      <section class="body" aria-label="提供商列表">
        <div class="list-panel" aria-label="凭证列表">
          <div class="table-row header" role="row">
            <div class="cell th" role="columnheader">账户名称</div>
            <div class="cell th" role="columnheader">所属模型 / Provider来源</div>
            <div class="cell th" role="columnheader">是否可用</div>
            <div class="cell th" role="columnheader">用量</div>
            <div class="cell" role="columnheader"></div>
          </div>
          <div id="provider-rows" role="rowgroup"></div>
        </div>

        <footer class="bottom-pagination" aria-label="分页">
          <div class="pager">
            <span class="pager-index" id="provider-count">--</span>
          </div>
          <button class="scroll-btn" type="button" id="refresh-providers" aria-label="刷新">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
            <span>刷新 Refresh</span>
          </button>
        </footer>
      </section>
    </main>
  </div>
  <dialog id="provider-dialog">
    <form id="provider-form" method="dialog">
      <h3 id="provider-dialog-title" style="margin:0 0 12px;font-family:var(--font-display);">Provider</h3>
      <div class="dialog-grid">
        <label class="dialog-field">
          <span class="dialog-label">ID</span>
          <input class="dialog-input" name="id" required placeholder="forward" />
        </label>
        <label class="dialog-field">
          <span class="dialog-label">Type</span>
          <select class="dialog-input" name="type">
            <option value="builtin">builtin</option>
            <option value="module">module</option>
          </select>
        </label>
        <label class="dialog-field">
          <span class="dialog-label">Protocol</span>
          <select class="dialog-input" name="protocol" required>
            <option value="forward">forward</option>
            <option value="anthropic">anthropic</option>
            <option value="http_openai">http_openai</option>
            <option value="http_rpc">http_rpc</option>
            <option value="grpc_chat">grpc_chat</option>
          </select>
        </label>
        <label class="dialog-field">
          <span class="dialog-label">Endpoint</span>
          <input class="dialog-input" name="endpoint" required placeholder="https://api.openai.com/v1" />
        </label>
        <label class="dialog-field dialog-field--full">
          <span class="dialog-label">Config JSON</span>
          <textarea class="dialog-input dialog-textarea" name="configJSON" rows="8" spellcheck="false" placeholder='{"api_key":"","base_url":"..."}'></textarea>
        </label>
        <label class="dialog-check dialog-field--full">
          <input type="checkbox" name="enabled" />
          <span>Enabled</span>
        </label>
      </div>
      <div class="dialog-actions">
        <button class="dialog-btn" type="button" id="provider-cancel">取消</button>
        <button class="dialog-btn primary" type="submit" id="provider-save">保存</button>
      </div>
    </form>
  </dialog>
  <script src="/admin/static/admin.js"></script>
  <script>
    (() => {
      const LB = window.LightBridgeAdmin;
      if (!LB) return;

      const ROWS = document.getElementById('provider-rows');
      const COUNT = document.getElementById('provider-count');
      const REFRESH = document.getElementById('refresh-providers');
      const ADD = document.getElementById('add-provider-btn');

      const DIALOG = document.getElementById('provider-dialog');
      const FORM = document.getElementById('provider-form');
      const TITLE = document.getElementById('provider-dialog-title');
      const CANCEL = document.getElementById('provider-cancel');
      const SAVE = document.getElementById('provider-save');

      const F_ID = FORM.elements.namedItem('id');
      const F_TYPE = FORM.elements.namedItem('type');
      const F_PROTOCOL = FORM.elements.namedItem('protocol');
      const F_ENDPOINT = FORM.elements.namedItem('endpoint');
      const F_CFG = FORM.elements.namedItem('configJSON');
      const F_ENABLED = FORM.elements.namedItem('enabled');

      const USAGE_BAR_WIDTH = 116;

      let lastProviders = [];
      let usageByProvider = new Map();
      let maxUsage = 0;
      let editingID = null;

      function providerID(p) {
        return String(p?.ID ?? p?.id ?? '').trim();
      }

      function openDialog(mode, provider) {
        editingID = mode === 'edit' ? providerID(provider) : null;
        TITLE.textContent = mode === 'edit' ? `编辑 Provider · ${editingID}` : '添加 Provider';
        F_ID.value = editingID || '';
        F_ID.disabled = mode === 'edit';
        F_TYPE.value = String(provider?.Type ?? provider?.type ?? 'builtin');
        F_PROTOCOL.value = String(provider?.Protocol ?? provider?.protocol ?? 'forward');
        F_ENDPOINT.value = String(provider?.Endpoint ?? provider?.endpoint ?? '');
        F_CFG.value = String(provider?.ConfigJSON ?? provider?.configJSON ?? '{}');
        F_ENABLED.checked = Boolean(provider?.Enabled ?? provider?.enabled ?? true);
        DIALOG.showModal();
      }

      function closeDialog() {
        editingID = null;
        DIALOG.close();
      }

      function safeJSON(text) {
        const raw = String(text ?? '').trim();
        if (!raw) return '{}';
        const parsed = JSON.parse(raw);
        return JSON.stringify(parsed, null, 2);
      }

      function computeUsage(logs) {
        usageByProvider = new Map();
        maxUsage = 0;
        for (const item of Array.isArray(logs) ? logs : []) {
          const pid = String(item?.ProviderID ?? item?.providerID ?? '').trim();
          if (!pid) continue;
          const tokens = Number(item?.InputTokens ?? item?.inputTokens ?? 0) + Number(item?.OutputTokens ?? item?.outputTokens ?? 0);
          const prev = usageByProvider.get(pid) || { requests: 0, tokens: 0 };
          const next = { requests: prev.requests + 1, tokens: prev.tokens + tokens };
          usageByProvider.set(pid, next);
          if (next.tokens > maxUsage) maxUsage = next.tokens;
        }
      }

      function render() {
        ROWS.innerHTML = '';
        COUNT.textContent = `${LB.formatCompactNumber(lastProviders.length)} providers`;

        if (!lastProviders.length) {
          ROWS.appendChild(LB.el('div', { className: 'table-row data', role: 'row' }, [
            LB.el('div', { className: 'cell account', role: 'cell', text: '暂无 Provider' }),
            LB.el('div', { className: 'cell', role: 'cell' }, [
              LB.el('div', { className: 'cell-stack' }, [
                LB.el('div', { className: 'stack-title', text: '请点击右上角「添加」创建' }),
                LB.el('div', { className: 'stack-subtitle', text: '数据来自 /admin/api/providers' }),
              ]),
            ]),
            LB.el('div', { className: 'cell', role: 'cell' }, [
              LB.el('div', { className: 'status bad' }, [
                LB.el('span', { className: 'status-dot', 'aria-hidden': 'true' }),
                LB.el('span', { text: '空' }),
              ]),
            ]),
            LB.el('div', { className: 'cell', role: 'cell' }, [
              LB.el('div', { className: 'usage' }, [
                LB.el('div', { className: 'usage-pct', text: '0%' }),
                LB.el('div', { className: 'usage-bar' }, [LB.el('div', { className: 'usage-fill', style: '--w:0px;--c:var(--success)' })]),
              ]),
            ]),
            LB.el('div', { className: 'cell', role: 'cell' }),
          ]));
          return;
        }

        for (const p of lastProviders) {
          const id = providerID(p);
          const protocol = String(p?.Protocol ?? p?.protocol ?? '');
          const type = String(p?.Type ?? p?.type ?? '');
          const endpoint = String(p?.Endpoint ?? p?.endpoint ?? '');
          const enabled = Boolean(p?.Enabled ?? p?.enabled ?? false);

          const statusClass = enabled ? 'ok' : 'bad';
          const statusText = enabled ? '可用' : '禁用';

          const usage = usageByProvider.get(id) || { requests: 0, tokens: 0 };
          const pct = maxUsage > 0 ? Math.round((usage.tokens / maxUsage) * 100) : 0;
          const w = Math.round((USAGE_BAR_WIDTH * pct) / 100);

          ROWS.appendChild(LB.el('div', { className: 'table-row data', role: 'row' }, [
            LB.el('div', { className: 'cell account', role: 'cell', text: id || '-' }),
            LB.el('div', { className: 'cell', role: 'cell' }, [
              LB.el('div', { className: 'cell-stack' }, [
                LB.el('div', { className: 'stack-title', text: protocol || 'unknown' }),
                LB.el('div', { className: 'stack-subtitle', text: `${type || 'builtin'} · ${endpoint || ''}`.trim() }),
              ]),
            ]),
            LB.el('div', { className: 'cell', role: 'cell' }, [
              LB.el('div', { className: `status ${statusClass}` }, [
                LB.el('span', { className: 'status-dot', 'aria-hidden': 'true' }),
                LB.el('span', { text: statusText }),
              ]),
            ]),
            LB.el('div', { className: 'cell', role: 'cell' }, [
              LB.el('div', { className: 'usage', title: `最近 200 条请求累计 ${LB.formatTokens(usage.tokens)} tokens / ${LB.formatCompactNumber(usage.requests)} requests` }, [
                LB.el('div', { className: 'usage-pct', text: `${pct}%` }),
                LB.el('div', { className: 'usage-bar' }, [
                  LB.el('div', { className: 'usage-fill', style: `--w:${w}px;--c:var(--success)` }),
                ]),
              ]),
            ]),
            LB.el('div', { className: 'cell', role: 'cell' }, [
              LB.el('div', { className: 'more', role: 'button', tabIndex: 0, dataset: { action: 'edit', id } }, ['···']),
            ]),
          ]));
        }
      }

      async function load() {
        try {
          const [prov, logs] = await Promise.all([
            LB.apiJSON('/admin/api/providers'),
            LB.apiJSON('/admin/api/logs'),
          ]);
          lastProviders = Array.isArray(prov?.data) ? prov.data : [];
          computeUsage(logs?.data || []);
          render();
        } catch (err) {
          LB.toast(err?.message || '加载失败', 'error', 4200);
        }
      }

      ROWS.addEventListener('click', (e) => {
        const target = e.target?.closest?.('[data-action="edit"]');
        if (!target) return;
        const id = String(target.dataset.id || '');
        const p = lastProviders.find((x) => providerID(x) === id);
        if (p) openDialog('edit', p);
      });
      ROWS.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const target = e.target?.closest?.('[data-action="edit"]');
        if (!target) return;
        const id = String(target.dataset.id || '');
        const p = lastProviders.find((x) => providerID(x) === id);
        if (p) openDialog('edit', p);
      });

      ADD.addEventListener('click', () => openDialog('add', { type: 'builtin', protocol: 'forward', endpoint: '', enabled: true, configJSON: '{}' }));
      REFRESH.addEventListener('click', load);
      CANCEL.addEventListener('click', closeDialog);

      FORM.addEventListener('submit', async (e) => {
        e.preventDefault();
        SAVE.disabled = true;
        try {
          const id = String(F_ID.value || '').trim();
          if (!id) throw new Error('ID 不能为空');
          const cfg = safeJSON(F_CFG.value);
          const payload = {
            id,
            type: String(F_TYPE.value || '').trim() || 'builtin',
            protocol: String(F_PROTOCOL.value || '').trim() || 'forward',
            endpoint: String(F_ENDPOINT.value || '').trim(),
            configJSON: cfg,
            enabled: Boolean(F_ENABLED.checked),
          };
          await LB.apiJSON('/admin/api/providers', { method: 'POST', body: payload });
          LB.toast('已保存', 'ok');
          closeDialog();
          await load();
        } catch (err) {
          LB.toast(err?.message || '保存失败', 'error', 4200);
        } finally {
          SAVE.disabled = false;
        }
      });

      load();
    })();
  </script>
</body>
</html>
