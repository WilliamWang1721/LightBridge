<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文档 Documentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page: #ffffff;
      --bg-surface: #fafafa;
      --bg-card: #ffffff;
      --border: #e8e8e8;
      --text-main: #0d0d0d;
      --text-secondary: #7a7a7a;
      --text-muted: #b0b0b0;
      --red-primary: #e42313;
      --success: #22c55e;
      --font-display: "Space Grotesk", "Noto Sans SC", sans-serif;
      --font-body: "Inter", "Noto Sans SC", sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg-page); color: var(--text-main); font-family: var(--font-body); font-size: 16px; line-height: 1.45; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
    .shell { display: flex; min-height: 100vh; background: var(--bg-page); }
    .sidebar { width: 240px; min-width: 240px; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 32px; border-right: 1px solid var(--border); background: var(--bg-page); }
    .brand { display: inline-flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 600; letter-spacing: 0.01em; margin-bottom: 48px; font-family: var(--font-display); }
    .brand-mark { width: 28px; height: 28px; background: var(--red-primary); display: inline-block; }
    .menu { display: flex; flex-direction: column; gap: 8px; }
