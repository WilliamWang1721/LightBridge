<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LightBridge Setup</title>
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2/css/pico.min.css" />
</head>
<body class="container">
  <main>
    <h1>Setup Wizard</h1>
    <p>Create your admin account and first client API key.</p>
    <form id="setup-form">
      <label>Username <input type="text" name="username" required value="admin" /></label>
      <label>Password <input type="password" name="password" required /></label>
      <button type="submit">Initialize</button>
    </form>
    <pre id="out"></pre>
  </main>
  <script>
    document.getElementById('setup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());
      const res = await fetch('/admin/api/setup', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(data)
      });
      const body = await res.json();
      document.getElementById('out').textContent = JSON.stringify(body, null, 2);
      if (res.ok) {
        location.href = '/admin/dashboard';
      }
    });
  </script>
</body>
</html>
