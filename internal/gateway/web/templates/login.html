<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-surface: #fafafa;
      --bg-card: #ffffff;
      --border: #e8e8e8;
      --text-main: #0d0d0d;
      --text-secondary: #7a7a7a;
      --red-primary: #e42313;
      --font-display: "Space Grotesk", "Noto Sans SC", sans-serif;
      --font-body: "Inter", "Noto Sans SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg-surface);
      color: var(--text-main);
      font-family: var(--font-body);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 460px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 36px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .brand-header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .brand-row {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--red-primary);
      display: inline-block;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      line-height: 26px;
      margin: 0;
    }

    .title {
      width: 100%;
      margin: 0;
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 600;
      text-align: center;
    }

    .subtitle {
      width: 100%;
      margin: 0;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-secondary);
      text-align: center;
    }

    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .label {
      margin: 0;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
    }

    .forgot {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--red-primary);
      text-align: right;
      white-space: nowrap;
    }

    .input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 400;
      color: var(--text-main);
      outline: none;
    }

    .input::placeholder {
      color: var(--text-secondary);
      opacity: 1;
    }

    .input:focus {
      border-color: #d0d0d0;
    }

    .remember-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .remember-left {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      border: 1px solid var(--border);
      background: #ffffff;
      appearance: none;
      -webkit-appearance: none;
      margin: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .checkbox:checked::after {
      content: "";
      width: 10px;
      height: 6px;
      border-left: 2px solid var(--text-main);
      border-bottom: 2px solid var(--text-main);
      transform: rotate(-45deg);
      margin-top: -1px;
    }

    .remember-text {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      user-select: none;
    }

    .btn {
      width: 100%;
      height: 44px;
      border: 0;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.primary {
      background: var(--red-primary);
      color: #ffffff;
    }

    .btn.secondary {
      background: #ffffff;
      color: var(--text-main);
      border: 1px solid var(--border);
      font-weight: 500;
    }

    .btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .note {
      width: 100%;
      margin: 0;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-secondary);
      text-align: center;
    }

    #out {
      margin: 0;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #b42318;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      padding: 10px 12px;
    }

    @media (max-width: 520px) {
      .card {
        width: 100%;
        padding: 28px 22px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Admin 登录">
      <header class="brand-header">
        <div class="brand-row" aria-label="LightBridge">
          <span class="logo-mark" aria-hidden="true"></span>
          <p class="logo-text">LightBridge</p>
        </div>
        <h1 class="title">Admin 登录</h1>
        <p class="subtitle">登录以使用您的 LightBridge Admin 后台</p>
      </header>

      <form id="login-form" class="form">
        <div class="field">
          <p class="label">用户名 Username</p>
          <input class="input" type="text" name="username" required autocomplete="username" placeholder="admin@lightbridge.com" />
        </div>

        <div class="field">
          <div class="label-row">
            <p class="label">密码 Password</p>
            <a class="forgot" href="#" onclick="return false">忘记密码？</a>
          </div>
          <input class="input" type="password" name="password" required autocomplete="current-password" placeholder="••••••••••••" />
        </div>

        <div class="remember-row">
          <label class="remember-left">
            <input class="checkbox" type="checkbox" name="remember" />
            <span class="remember-text">记住此设备</span>
          </label>
        </div>

        <button class="btn primary" type="submit">登录 Login</button>
      </form>

      <button class="btn secondary" type="button" disabled aria-disabled="true" title="暂未开放">以自定义方式登录</button>
      <p class="note">Produced by MovingDOT Tech.</p>
      <pre id="out"></pre>
    </section>
  </main>
  <script>
    const DEVICE_STORAGE_KEY = 'lightbridge_admin_device';

    function collectDeviceInfo() {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      return {
        userAgent: navigator.userAgent,
        language: navigator.language,
        platform: navigator.platform,
        timezone: tz,
        screen: { w: screen.width, h: screen.height, dpr: window.devicePixelRatio || 1 },
        savedAt: new Date().toISOString(),
      };
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const remember = formData.get('remember') === 'on';
      const data = {
        username: String(formData.get('username') || ''),
        password: String(formData.get('password') || ''),
        remember,
      };

      // If "remember device" is enabled, store browser info locally and send it to server.
      if (remember) {
        const device = collectDeviceInfo();
        try {
          localStorage.setItem(DEVICE_STORAGE_KEY, JSON.stringify(device));
        } catch (_) {
          // Ignore storage errors; remember still works via cookie.
        }
        data.device = device;
      }

      const res = await fetch('/admin/api/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(data)
      });
      const body = await res.json();
      const out = document.getElementById('out');
      if (!res.ok) {
        out.style.display = 'block';
        out.textContent = JSON.stringify(body, null, 2);
        return;
      }
      out.style.display = 'none';
      out.textContent = '';
      if (res.ok) {
        location.href = '/admin/dashboard';
      }
    });
  </script>
</body>
</html>
