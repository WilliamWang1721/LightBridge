<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-surface: #fafafa;
      --border: #e8e8e8;
      --text-main: #0d0d0d;
      --text-secondary: #7a7a7a;
      --red-primary: #e42313;
      --font-display: "Space Grotesk", "Noto Sans SC", sans-serif;
      --font-body: "Inter", "Noto Sans SC", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--text-main);
      background: var(--bg-page);
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    .shell {
      display: flex;
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg-page);
    }

    .sidebar {
      width: 240px;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 32px;
      border-right: 1px solid var(--border);
      overflow: hidden;
      background: var(--bg-page);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-bottom: 48px;
      font-family: var(--font-display);
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      background: var(--red-primary);
      display: inline-block;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-item {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      font-size: 14px;
      color: var(--text-secondary);
      transition: color 0.2s ease;
      font-family: var(--font-display);
      font-weight: 400;
    }

    .menu-item:hover { color: var(--text-main); }

    .menu-item.is-active {
      color: var(--text-main);
      font-weight: 500;
    }

    .menu-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--bg-page);
      flex-shrink: 0;
    }

    .menu-item.is-active .menu-dot { background: var(--red-primary); }

    .sidebar-bottom {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-chip {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--text-main);
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-display);
      border: 0;
    }

    .sidebar-user {
      font-size: 13px;
      color: var(--text-main);
      font-weight: 500;
      font-family: var(--font-display);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content {
      flex: 1;
      min-height: 0;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      overflow-x: hidden;
      min-width: 0;
    }

    .breadcrumb {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .breadcrumb a {
      color: var(--text-secondary);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .page-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -1px;
      line-height: 1.08;
      color: var(--text-main);
    }

    .page-subtitle {
      margin: 8px 0 0;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .panel {
      border: 1px solid var(--border);
      background: var(--bg-card);
      padding: 18px;
      max-width: 700px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px;
    }

    .label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text-main);
      outline: none;
    }

    .input:focus { border-color: #d0d0d0; }

    .actions {
      margin-top: 16px;
      display: inline-flex;
      gap: 10px;
    }

    .btn {
      height: 38px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text-main);
      padding: 0 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--text-main);
      border-color: var(--text-main);
      color: #ffffff;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .msg {
      display: none;
      margin: 0;
      border: 1px solid #d7d7d7;
      background: #f8f8f8;
      color: #333;
      padding: 10px 12px;
      font-size: 13px;
      max-width: 700px;
    }

    @media (max-width: 960px) {
      .shell { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-width: 0;
        border-right: 0;
        border-bottom: 1px solid var(--border);
        padding: 20px 18px;
      }
      .brand { margin-bottom: 12px; }
      .menu { flex-direction: row; flex-wrap: wrap; gap: 12px 16px; }
      .content { padding: 24px 18px 32px; }
      .page-title { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar" aria-label="Sidebar">
      <div class="sidebar-top">
        <a class="brand" href="/admin/dashboard">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>LightBridge</span>
        </a>
        <nav class="menu" aria-label="主导航">
          <a class="menu-item" href="/admin/dashboard"><span class="menu-dot" aria-hidden="true"></span>概览 Overview</a>
          <a class="menu-item" href="/admin/consumption"><span class="menu-dot" aria-hidden="true"></span>统计 Statistics</a>
          <a class="menu-item" href="/admin/providers"><span class="menu-dot" aria-hidden="true"></span>提供商 Provider</a>
          <a class="menu-item" href="/admin/router"><span class="menu-dot" aria-hidden="true"></span>路由 Router</a>
          <a class="menu-item" href="/admin/marketplace"><span class="menu-dot" aria-hidden="true"></span>模块 Marketplace</a>
          <a class="menu-item is-active" href="/admin/settings"><span class="menu-dot" aria-hidden="true"></span>设置 Settings</a>
        </nav>
      </div>
      <div class="sidebar-bottom">
        <span class="admin-chip">A</span>
        <span class="sidebar-user">{{.Username}}</span>
      </div>
    </aside>

    <main class="content">
      <div class="breadcrumb"><a href="/admin/settings">设置</a><span>/</span><a href="/admin/settings/auth">认证</a><span>/</span><span>密码</span></div>
      <header>
        <h1 class="page-title">密码</h1>
        <p class="page-subtitle">修改当前管理员账号密码，保存后立即生效。</p>
      </header>

      <section class="panel">
        <div class="field">
          <label class="label" for="old-password">当前密码</label>
          <input class="input" id="old-password" type="password" autocomplete="current-password" />
        </div>
        <div class="field">
          <label class="label" for="new-password">新密码</label>
          <input class="input" id="new-password" type="password" autocomplete="new-password" />
        </div>
        <div class="field">
          <label class="label" for="confirm-password">确认新密码</label>
          <input class="input" id="confirm-password" type="password" autocomplete="new-password" />
        </div>
        <div class="actions">
          <button class="btn primary" id="save-password" type="button">保存密码</button>
        </div>
      </section>

      <p class="msg" id="msg"></p>
    </main>
  </div>

  <script>
    (() => {
      const msgEl = document.getElementById('msg');
      const oldPwd = document.getElementById('old-password');
      const newPwd = document.getElementById('new-password');
      const confirmPwd = document.getElementById('confirm-password');
      const saveBtn = document.getElementById('save-password');

      function showMsg(text, isError = false) {
        msgEl.style.display = 'block';
        msgEl.textContent = String(text || '');
        msgEl.style.background = isError ? '#fff5f5' : '#f6fff5';
        msgEl.style.borderColor = isError ? '#f9ceca' : '#cce9c7';
        msgEl.style.color = isError ? '#ba1f14' : '#24691b';
      }

      async function api(url, opts) {
        const res = await fetch(url, Object.assign({
          headers: { 'content-type': 'application/json', 'accept': 'application/json' }
        }, opts || {}));
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(String(body?.error || body?.message || res.statusText || 'request failed'));
        }
        return body;
      }

      saveBtn.addEventListener('click', async () => {
        const oldPassword = String(oldPwd.value || '');
        const newPassword = String(newPwd.value || '');
        const confirmPassword = String(confirmPwd.value || '');

        if (!oldPassword || !newPassword || !confirmPassword) {
          showMsg('请完整填写所有密码字段', true);
          return;
        }
        if (newPassword !== confirmPassword) {
          showMsg('两次输入的新密码不一致', true);
          return;
        }
        if (newPassword.length < 8) {
          showMsg('新密码长度至少 8 位', true);
          return;
        }

        saveBtn.disabled = true;
        try {
          await api('/admin/api/change_password', {
            method: 'POST',
            body: JSON.stringify({ old_password: oldPassword, new_password: newPassword }),
          });
          oldPwd.value = '';
          newPwd.value = '';
          confirmPwd.value = '';
          showMsg('密码修改成功');
        } catch (err) {
          showMsg(err?.message || '密码修改失败', true);
        } finally {
          saveBtn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
