<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Page}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <style>
    :root {
      --bg-page: #ffffff;
      --bg-surface: #fafafa;
      --bg-card: #ffffff;
      --border: #e8e8e8;
      --text-main: #0d0d0d;
      --text-secondary: #7a7a7a;
      --text-muted: #b0b0b0;
      --red-primary: #e42313;
      --font-display: "Space Grotesk", "Noto Sans SC", sans-serif;
      --font-body: "Inter", "Noto Sans SC", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      background: var(--bg-page);
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.45;
      overflow: hidden;
    }

    .chatbox-page {
      height: 100vh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-page);
    }

    .topbar {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      background: var(--bg-page);
    }

    .topbar-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .title-row {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .title-row h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 34px;
      letter-spacing: -0.8px;
      line-height: 1.06;
      font-weight: 600;
      color: var(--text-main);
      min-width: 0;
    }

    .topbar-sub {
      margin: 0;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: var(--font-body);
    }

    .topbar-right {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .plugin-tip {
      border: 1px solid var(--border);
      background: var(--bg-page);
      color: var(--text-secondary);
      border-radius: 999px;
      font-size: 11px;
      font-family: var(--font-body);
      font-weight: 500;
      padding: 6px 10px;
      white-space: nowrap;
      user-select: none;
    }

    .btn {
      height: 36px;
      border: 1px solid var(--border);
      background: var(--bg-page);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      cursor: pointer;
      color: var(--text-main);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      user-select: none;
    }

    .btn:active { transform: translateY(1px); }

    .btn.primary {
      background: var(--text-main);
      border-color: var(--text-main);
      color: #ffffff;
      padding: 10px 20px;
    }

    .btn.danger {
      color: #b42318;
      border-color: #f1d5d1;
      background: #fff7f6;
    }

    .icon {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .chat-body {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 0;
      overflow: hidden;
    }

    .chat-left {
      min-height: 0;
      border-right: 1px solid var(--border);
      background: var(--bg-page);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .left-head {
      border-bottom: 1px solid var(--border);
      padding: 14px;
      display: grid;
      gap: 10px;
      background: var(--bg-card);
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      line-height: 1.2;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg-page);
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 13px;
      border-radius: 8px;
      padding: 8px 10px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #bdbdbd;
    }

    #chat-system-prompt {
      min-height: 62px;
      resize: vertical;
      font-size: 12px;
    }

    .chat-list {
      min-height: 0;
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--bg-surface);
    }

    .chat-item {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg-page);
      padding: 10px;
      border-radius: 10px;
      display: grid;
      gap: 6px;
      text-align: left;
      cursor: pointer;
      font-family: var(--font-body);
    }

    .chat-item.is-active {
      border-color: #d0d0d0;
      background: #f8f8f8;
    }

    .chat-item-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      line-height: 1.35;
      word-break: break-word;
    }

    .chat-item-meta,
    .chat-item-preview {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .chat-item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .chat-item-preview {
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .chat-right {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--bg-page);
    }

    .chat-right-head {
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      background: var(--bg-page);
    }

    .chat-right-head h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text-main);
    }

    .chat-right-head p {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: var(--font-body);
    }

    .chat-right-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
      user-select: none;
      cursor: pointer;
      font-family: var(--font-body);
    }

    .chat-messages {
      min-height: 0;
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--bg-surface);
    }

    .msg {
      max-width: 88%;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      background: var(--bg-page);
      display: grid;
      gap: 8px;
      box-shadow: 0 1px 0 rgba(0,0,0,.02);
    }

    .msg[data-role="user"] {
      margin-left: auto;
      background: #f5f5f5;
    }

    .msg[data-role="assistant"] {
      margin-right: auto;
      background: #ffffff;
    }

    .msg-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 11px;
      color: var(--text-secondary);
      font-family: var(--font-body);
    }

    .msg-body {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.6;
      word-break: break-word;
      font-family: var(--font-body);
    }

    .msg-body p { margin: 0 0 .55em; }
    .msg-body p:last-child { margin-bottom: 0; }

    .msg-body pre {
      margin: .6em 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: #111;
      color: #f5f5f5;
      overflow: auto;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .msg-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92em;
      background: #f2f2f2;
      border-radius: 4px;
      padding: 1px 4px;
    }

    .msg-body pre code {
      background: transparent;
      padding: 0;
    }

    .msg-reasoning {
      border-top: 1px dashed var(--border);
      padding-top: 8px;
      display: grid;
      gap: 8px;
    }

    .msg-reasoning summary {
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
      list-style: none;
      font-family: var(--font-body);
    }

    .msg-reasoning summary::-webkit-details-marker { display: none; }

    .msg-reasoning-body {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfbfb;
      font-size: 12px;
      line-height: 1.6;
      color: #303030;
      padding: 8px 10px;
    }

    .chat-composer {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: grid;
      gap: 10px;
      background: var(--bg-page);
    }

    #chat-input {
      min-height: 92px;
      resize: vertical;
    }

    .composer-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .status {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: var(--font-body);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: #ffffff;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: var(--font-body);
      text-align: center;
      padding: 18px;
    }

    @media (max-width: 1100px) {
      .topbar {
        padding: 20px 16px;
      }

      .chat-body {
        grid-template-columns: 1fr;
        grid-template-rows: 320px minmax(0, 1fr);
      }

      .chat-left {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      .title-row h1 {
        font-size: 28px;
      }
    }

    @media (max-width: 700px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .composer-row {
        grid-template-columns: 1fr;
      }

      .msg {
        max-width: 96%;
      }
    }
  </style>
</head>
<body>
  <div class="chatbox-page">
    <header class="topbar">
      <div class="topbar-left">
        <div class="title-row">
          <a class="btn" href="/admin/dashboard" aria-label="返回概览">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            <span>概览</span>
          </a>
          <h1>对话 Chatbox</h1>
        </div>
        <p class="topbar-sub">全屏会话模式 · 长期存储 · Markdown/LaTeX · 思维链 · 流式传输</p>
      </div>
      <div class="topbar-right">
        <span class="plugin-tip" id="chat-plugin-tip">Markdown/LaTeX 插件加载中</span>
      </div>
    </header>

    <section class="chat-body" aria-label="Chatbox">
      <aside class="chat-left" aria-label="会话列表">
        <div class="left-head">
          <button class="btn primary" id="chat-create-btn" type="button">新建对话</button>
          <div class="field">
            <label for="chat-create-model">新对话模型</label>
            <select id="chat-create-model"></select>
          </div>
          <div class="field">
            <label for="chat-system-prompt">System Prompt（可选）</label>
            <textarea id="chat-system-prompt" placeholder="为新会话设置系统提示词（可空）"></textarea>
          </div>
        </div>
        <div class="chat-list" id="chat-list"></div>
      </aside>

      <section class="chat-right" aria-label="会话详情">
        <header class="chat-right-head">
          <div>
            <h2 id="chat-title">请选择一个会话</h2>
            <p id="chat-meta">左侧新建后即可开始对话</p>
          </div>
          <div class="chat-right-actions">
            <label class="toggle">
              <input id="chat-show-reasoning" type="checkbox" />
              <span>显示思维链</span>
            </label>
            <button class="btn danger" id="chat-delete-btn" type="button">删除会话</button>
          </div>
        </header>

        <div class="chat-messages" id="chat-messages"></div>

        <footer class="chat-composer">
          <div class="composer-row">
            <div class="field">
              <label for="chat-send-model">发送模型</label>
              <select id="chat-send-model"></select>
            </div>
            <div class="field">
              <label for="chat-reasoning-effort">reasoning_efforts</label>
              <select id="chat-reasoning-effort">
                <option value="">默认</option>
                <option value="none">none</option>
                <option value="minimal">minimal</option>
                <option value="low">low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
                <option value="xhigh">xhigh</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="chat-input">输入消息（Cmd/Ctrl + Enter 发送）</label>
            <textarea id="chat-input" placeholder="输入内容，支持 Markdown / LaTeX 语法。"></textarea>
          </div>

          <div class="composer-actions">
            <label class="toggle">
              <input id="chat-stream" type="checkbox" checked />
              <span>流式传输</span>
            </label>
            <span class="status" id="chat-status">准备就绪</span>
            <button class="btn primary" id="chat-send-btn" type="button">发送消息</button>
          </div>
        </footer>
      </section>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="/admin/static/admin.js"></script>
  <script>
    (() => {
      const LB = window.LightBridgeAdmin;
      if (!LB) return;

      const STATE = {
        conversations: [],
        models: [],
        currentConversation: null,
        messages: [],
        sending: false,
        showReasoning: false,
      };

      let renderStamp = 0;

      function setStatus(text) {
        const node = document.getElementById('chat-status');
        if (node) node.textContent = String(text || '');
      }

      function formatDate(iso) {
        if (!iso) return '-';
        try {
          return LB.formatISODateTime(iso);
        } catch (_) {
          return String(iso);
        }
      }

      function collapseText(text) {
        return String(text || '').replace(/\s+/g, ' ').trim();
      }

      function shorten(text, maxLen = 68) {
        const v = collapseText(text);
        if (v.length <= maxLen) return v;
        return `${v.slice(0, maxLen)}...`;
      }

      function escapeHTML(text) {
        return String(text || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function markdownToHTML(text) {
        const raw = String(text || '');
        if (window.marked && typeof window.marked.parse === 'function') {
          try {
            const html = window.marked.parse(raw, { breaks: true, gfm: true });
            if (window.DOMPurify && typeof window.DOMPurify.sanitize === 'function') {
              return window.DOMPurify.sanitize(String(html || ''));
            }
            return String(html || '');
          } catch (_) {
            // fallback to escaped text
          }
        }
        return escapeHTML(raw).replace(/\n/g, '<br>');
      }

      function renderMath(host) {
        if (!host || !window.renderMathInElement) return;
        try {
          window.renderMathInElement(host, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false },
              { left: '\\(', right: '\\)', display: false },
              { left: '\\[', right: '\\]', display: true },
            ],
            throwOnError: false,
          });
        } catch (_) {
          // ignore render errors
        }
      }

      function renderRichText(host, text) {
        if (!host) return;
        host.innerHTML = markdownToHTML(text);
        renderMath(host);
      }

      function updatePluginHint() {
        const node = document.getElementById('chat-plugin-tip');
        if (!node) return;
        const hasMd = Boolean(window.marked && typeof window.marked.parse === 'function');
        const hasLatex = Boolean(window.renderMathInElement);
        if (hasMd && hasLatex) {
          node.textContent = 'Markdown + LaTeX 插件已启用';
          return;
        }
        if (hasMd) {
          node.textContent = 'Markdown 已启用，LaTeX 插件未就绪';
          return;
        }
        node.textContent = '插件未就绪，已启用基础文本渲染';
      }

      function renderConversationList() {
        const host = document.getElementById('chat-list');
        if (!host) return;
        host.innerHTML = '';
        const rows = Array.isArray(STATE.conversations) ? STATE.conversations : [];
        if (rows.length === 0) {
          host.appendChild(LB.el('div', { className: 'empty', text: '暂无会话。点击“新建对话”开始。' }));
          return;
        }

        for (const item of rows) {
          const id = String(item?.id || '');
          const title = String(item?.title || '新对话');
          const preview = shorten(item?.last_message_preview || '无消息');
          const model = String(item?.model_id || '-');
          const updatedAt = formatDate(item?.updated_at);
          const msgCount = Number(item?.message_count || 0);
          host.appendChild(LB.el('button', {
            className: `chat-item${STATE.currentConversation?.id === id ? ' is-active' : ''}`,
            type: 'button',
            onClick: () => openConversation(id),
          }, [
            LB.el('div', { className: 'chat-item-title', text: title }),
            LB.el('div', { className: 'chat-item-meta' }, [
              LB.el('span', { text: model }),
              LB.el('span', { text: `${msgCount} 条` }),
            ]),
            LB.el('div', { className: 'chat-item-preview', text: preview }),
            LB.el('div', { className: 'chat-item-meta' }, [
              LB.el('span', { text: updatedAt }),
            ]),
          ]));
        }
      }

      function renderMessages(force = true) {
        if (!force) {
          const now = Date.now();
          if (now - renderStamp < 66) return;
          renderStamp = now;
        }

        const host = document.getElementById('chat-messages');
        if (!host) return;
        host.innerHTML = '';

        if (!STATE.currentConversation) {
          host.appendChild(LB.el('div', { className: 'empty', text: '请选择左侧会话，或新建对话开始交流。' }));
          return;
        }
        const rows = Array.isArray(STATE.messages) ? STATE.messages : [];
        if (rows.length === 0) {
          host.appendChild(LB.el('div', { className: 'empty', text: '当前会话暂无消息，发送第一条消息开始。' }));
          return;
        }

        for (const row of rows) {
          const role = String(row?.role || 'assistant');
          const content = String(row?.content || '');
          const reasoning = String(row?.reasoning_text || '').trim();
          const createdAt = formatDate(row?.created_at);
          const provider = String(row?.provider_id || '').trim();
          const routeModel = String(row?.route_model || '').trim();

          const body = LB.el('div', { className: 'msg-body' });
          renderRichText(body, content || '(空内容)');

          const node = LB.el('article', { className: 'msg', dataset: { role } }, [
            LB.el('header', { className: 'msg-head' }, [
              LB.el('span', { text: role }),
              LB.el('span', { text: createdAt }),
            ]),
            body,
          ]);

          if (STATE.showReasoning && reasoning && role === 'assistant') {
            const reasoningBody = LB.el('div', { className: 'msg-reasoning-body' });
            renderRichText(reasoningBody, reasoning);
            node.appendChild(LB.el('details', { className: 'msg-reasoning' }, [
              LB.el('summary', { text: '思维链 / Reasoning' }),
              reasoningBody,
            ]));
          }

          if (role === 'assistant' && (provider || routeModel)) {
            node.appendChild(LB.el('footer', { className: 'msg-head' }, [
              LB.el('span', { text: provider ? `provider: ${provider}` : '' }),
              LB.el('span', { text: routeModel ? `model: ${routeModel}` : '' }),
            ]));
          }

          host.appendChild(node);
        }

        host.scrollTop = host.scrollHeight;
      }

      function renderConversationHeader() {
        const titleNode = document.getElementById('chat-title');
        const metaNode = document.getElementById('chat-meta');
        if (!titleNode || !metaNode) return;

        const conv = STATE.currentConversation;
        if (!conv) {
          titleNode.textContent = '请选择一个会话';
          metaNode.textContent = '左侧新建后即可开始对话';
          return;
        }
        const title = String(conv?.title || '新对话');
        const model = String(conv?.model_id || '-');
        const createdAt = formatDate(conv?.created_at);
        const updatedAt = formatDate(conv?.updated_at);
        titleNode.textContent = title;
        metaNode.textContent = `${model} · 创建于 ${createdAt} · 更新于 ${updatedAt}`;
      }

      function renderModelSelect(selectNode, selected = '') {
        if (!selectNode) return;
        const ids = Array.isArray(STATE.models) ? STATE.models : [];
        selectNode.innerHTML = '';
        for (const id of ids) {
          selectNode.appendChild(LB.el('option', { value: id, text: id }));
        }
        const chosen = String(selected || '').trim();
        if (chosen && ids.includes(chosen)) {
          selectNode.value = chosen;
          return;
        }
        if (ids.length > 0) selectNode.value = ids[0];
      }

      function syncSendModelFromConversation() {
        const node = document.getElementById('chat-send-model');
        if (!node) return;
        const convModel = String(STATE.currentConversation?.model_id || '').trim();
        renderModelSelect(node, convModel);
      }

      async function loadModels() {
        const body = await LB.apiJSON('/admin/api/models');
        const list = Array.isArray(body?.models) ? body.models : [];
        const ids = [];
        for (const item of list) {
          const id = String(item?.ID ?? item?.id ?? '').trim();
          if (id) ids.push(id);
        }
        ids.sort((a, b) => a.localeCompare(b));
        STATE.models = ids;

        renderModelSelect(document.getElementById('chat-create-model'));
        syncSendModelFromConversation();
      }

      async function loadConversations(preferID = '') {
        const body = await LB.apiJSON('/admin/api/chatbox/conversations');
        STATE.conversations = Array.isArray(body?.conversations) ? body.conversations : [];
        renderConversationList();

        const wanted = String(preferID || '').trim();
        if (wanted) {
          const found = STATE.conversations.find((x) => String(x?.id || '') === wanted);
          if (found) {
            await openConversation(wanted);
            return;
          }
        }

        if (!STATE.currentConversation && STATE.conversations.length > 0) {
          await openConversation(String(STATE.conversations[0]?.id || ''));
          return;
        }
        renderConversationHeader();
        renderMessages();
      }

      async function openConversation(id) {
        const conversationID = String(id || '').trim();
        if (!conversationID) return;
        const body = await LB.apiJSON(`/admin/api/chatbox/conversations/${encodeURIComponent(conversationID)}`);
        STATE.currentConversation = body?.conversation || null;
        STATE.messages = Array.isArray(body?.messages) ? body.messages : [];
        renderConversationList();
        renderConversationHeader();
        syncSendModelFromConversation();
        renderMessages();
      }

      async function createConversation() {
        const modelNode = document.getElementById('chat-create-model');
        const systemNode = document.getElementById('chat-system-prompt');
        const model = String(modelNode?.value || '').trim();
        if (!model) {
          LB.toast('请先选择模型', 'error', 3200);
          return;
        }
        setStatus('创建会话中...');
        const body = await LB.apiJSON('/admin/api/chatbox/conversations', {
          method: 'POST',
          body: {
            model,
            system_prompt: String(systemNode?.value || '').trim(),
          },
        });
        const conversationID = String(body?.conversation?.id || '').trim();
        if (!conversationID) {
          throw new Error('创建会话失败：未返回会话 ID');
        }
        LB.toast('已创建新会话', 'ok', 2200);
        if (systemNode) systemNode.value = '';
        await loadConversations(conversationID);
        setStatus('会话已创建');
      }

      function buildSendPayload(content, model, streamEnabled) {
        const effortNode = document.getElementById('chat-reasoning-effort');
        const reasoningEffort = String(effortNode?.value || '').trim();
        const params = {};
        if (reasoningEffort) params.reasoning_effort = reasoningEffort;

        return {
          content,
          model,
          params,
          stream: Boolean(streamEnabled),
        };
      }

      function appendStreamingPlaceholders(content) {
        const nowISO = new Date().toISOString();
        STATE.messages = Array.isArray(STATE.messages) ? STATE.messages.slice() : [];
        STATE.messages.push({
          role: 'user',
          content,
          created_at: nowISO,
        });
        STATE.messages.push({
          role: 'assistant',
          content: '',
          reasoning_text: '',
          created_at: nowISO,
        });
      }

      function updateStreamingAssistant(text, reasoning) {
        const rows = Array.isArray(STATE.messages) ? STATE.messages : [];
        if (rows.length === 0) return;
        const last = rows[rows.length - 1];
        if (!last || String(last.role || '') !== 'assistant') return;
        last.content = String(text || '');
        last.reasoning_text = String(reasoning || '');
      }

      function parseStreamBlock(raw) {
        const lines = String(raw || '').split(/\r?\n/);
        let event = 'message';
        const dataLines = [];
        for (const line of lines) {
          if (line.startsWith('event:')) {
            event = String(line.slice(6) || '').trim() || 'message';
            continue;
          }
          if (line.startsWith('data:')) {
            dataLines.push(String(line.slice(5) || '').trim());
          }
        }
        const joined = dataLines.join('');
        let payload = {};
        if (joined) {
          try {
            payload = JSON.parse(joined);
          } catch (_) {
            payload = { raw: joined };
          }
        }
        return { event, payload };
      }

      async function sendMessageStream(convID, content, model) {
        const payload = buildSendPayload(content, model, true);
        const resp = await fetch(`/admin/api/chatbox/conversations/${encodeURIComponent(convID)}/messages?stream=1`, {
          method: 'POST',
          headers: {
            accept: 'text/event-stream',
            'content-type': 'application/json',
          },
          body: JSON.stringify(payload),
        });

        if (!resp.ok) {
          const txt = await resp.text();
          let parsed = null;
          try { parsed = txt ? JSON.parse(txt) : null; } catch (_) { parsed = null; }
          throw new Error(parsed?.error || parsed?.details || txt || `请求失败(${resp.status})`);
        }
        if (!resp.body) {
          throw new Error('浏览器不支持流式响应');
        }

        appendStreamingPlaceholders(content);
        renderMessages();

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let assistantText = '';
        let reasoningText = '';
        let donePayload = null;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          while (true) {
            const idx = buffer.indexOf('\n\n');
            if (idx < 0) break;
            const block = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            if (!block.trim()) continue;

            const { event, payload: evt } = parseStreamBlock(block);
            if (event === 'delta') {
              assistantText += String(evt?.delta || '');
              updateStreamingAssistant(assistantText, reasoningText);
              renderMessages(false);
              continue;
            }
            if (event === 'reasoning') {
              reasoningText += String(evt?.delta || '');
              updateStreamingAssistant(assistantText, reasoningText);
              renderMessages(false);
              continue;
            }
            if (event === 'error') {
              throw new Error(String(evt?.error || evt?.details || '流式传输失败'));
            }
            if (event === 'done') {
              donePayload = evt || {};
            }
          }
        }

        if (donePayload?.conversation) STATE.currentConversation = donePayload.conversation;
        if (Array.isArray(donePayload?.messages)) {
          STATE.messages = donePayload.messages;
        } else {
          updateStreamingAssistant(assistantText, reasoningText);
        }

        renderConversationHeader();
        syncSendModelFromConversation();
        renderMessages();
      }

      async function sendMessage() {
        if (STATE.sending) return;
        const convID = String(STATE.currentConversation?.id || '').trim();
        if (!convID) {
          LB.toast('请先新建或选择会话', 'error', 3200);
          return;
        }

        const input = document.getElementById('chat-input');
        const content = String(input?.value || '').trim();
        if (!content) {
          LB.toast('请输入消息', 'error', 2600);
          return;
        }

        const sendModelNode = document.getElementById('chat-send-model');
        const model = String(sendModelNode?.value || STATE.currentConversation?.model_id || '').trim();
        if (!model) {
          LB.toast('请先选择发送模型', 'error', 2600);
          return;
        }

        const streamNode = document.getElementById('chat-stream');
        const streamEnabled = Boolean(streamNode?.checked);

        STATE.sending = true;
        setStatus(streamEnabled ? '流式传输中...' : '发送中...');
        try {
          if (streamEnabled) {
            await sendMessageStream(convID, content, model);
          } else {
            const body = await LB.apiJSON(`/admin/api/chatbox/conversations/${encodeURIComponent(convID)}/messages`, {
              method: 'POST',
              body: buildSendPayload(content, model, false),
            });
            STATE.currentConversation = body?.conversation || STATE.currentConversation;
            STATE.messages = Array.isArray(body?.messages) ? body.messages : STATE.messages;
            renderConversationHeader();
            syncSendModelFromConversation();
            renderMessages();
          }

          if (input) input.value = '';
          await loadConversations(convID);
          setStatus('已完成');
        } catch (err) {
          LB.toast(err?.body?.error || err?.message || '发送失败', 'error', 4200);
          setStatus('发送失败');
        } finally {
          STATE.sending = false;
        }
      }

      async function deleteConversation() {
        const convID = String(STATE.currentConversation?.id || '').trim();
        if (!convID) {
          LB.toast('当前没有可删除的会话', 'error', 2800);
          return;
        }
        if (!window.confirm('确认删除当前会话？删除后不可恢复。')) return;
        await LB.apiJSON(`/admin/api/chatbox/conversations/${encodeURIComponent(convID)}`, {
          method: 'DELETE',
        });
        LB.toast('会话已删除', 'ok', 2200);
        STATE.currentConversation = null;
        STATE.messages = [];
        await loadConversations();
      }

      function bindEvents() {
        const createBtn = document.getElementById('chat-create-btn');
        const sendBtn = document.getElementById('chat-send-btn');
        const deleteBtn = document.getElementById('chat-delete-btn');
        const input = document.getElementById('chat-input');
        const reasoningToggle = document.getElementById('chat-show-reasoning');

        if (createBtn) {
          createBtn.addEventListener('click', () => {
            createConversation().catch((err) => {
              LB.toast(err?.message || '创建会话失败', 'error', 4200);
              setStatus('创建失败');
            });
          });
        }
        if (sendBtn) sendBtn.addEventListener('click', sendMessage);
        if (deleteBtn) {
          deleteBtn.addEventListener('click', () => {
            deleteConversation().catch((err) => {
              LB.toast(err?.message || '删除失败', 'error', 4200);
            });
          });
        }
        if (reasoningToggle) {
          reasoningToggle.addEventListener('change', () => {
            STATE.showReasoning = Boolean(reasoningToggle.checked);
            renderMessages();
          });
        }
        if (input) {
          input.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
              e.preventDefault();
              sendMessage();
            }
          });
        }
      }

      async function init() {
        bindEvents();
        updatePluginHint();
        setStatus('加载中...');
        try {
          await loadModels();
          await loadConversations();
          setStatus('准备就绪');
        } catch (err) {
          setStatus('加载失败');
          LB.toast(err?.message || '初始化失败', 'error', 4200);
        }
      }

      init();
    })();
  </script>
</body>
</html>
